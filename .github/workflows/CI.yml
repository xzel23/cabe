name: CI
on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  pages: write

env:
  INSTANCE: 'Writerside/cabe'
  DOCKER_VERSION: '243.21565'

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      is_release_version: ${{ steps.check-version.outputs.is_release_version }}
      version: ${{ steps.check-version.outputs.version }}
      gradle_version: ${{ steps.gradle-version.outputs.gradle_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Extract version and check if it's a release version
        id: check-version
        shell: bash
        run: |
          # Extract version from build.gradle.kts
          VERSION=$(grep -E "val projectVersion = " build.gradle.kts | sed -E 's/.*"(.*)".*/\1/')
          echo "Extracted version: $VERSION"
          
          # Check if it's a release version (not a development version or it's a tag)
          # Development versions contain snapshot, alpha, beta, or rc
          V_LOWER=$(echo "$VERSION" | tr '[:upper:]' '[:lower:]')
          IS_DEV=false
          for marker in snapshot alpha beta rc; do
            if [[ "$V_LOWER" == *"-$marker"* || "$V_LOWER" == *"."$marker"* ]]; then
              IS_DEV=true
              break
            fi
          done

          if [[ "$IS_DEV" == "false" || "$GITHUB_REF_TYPE" == "tag" ]]; then
            echo "This is a release or preview version"
            echo "is_release_version=true" >> $GITHUB_OUTPUT
          else
            echo "This is a development version"
            echo "is_release_version=false" >> $GITHUB_OUTPUT
          fi
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 'Extract Gradle Version'
        id: gradle-version
        shell: bash
        run: |
          GRADLE_VERSION=$(sed -n -e 's!.*gradle-!!' -e 's!-bin.zip!!p' < gradle/wrapper/gradle-wrapper.properties)
          echo "Detected Gradle version: $GRADLE_VERSION"
          echo "gradle_version=$GRADLE_VERSION" >> "$GITHUB_OUTPUT"

  build:
    needs: check
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Setup JDK 17 for build
      - name: 'Set up JDK 17'
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: 'Setup Gradle'
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: ${{ needs.check.outputs.gradle_version }}
          gradle-home-cache-includes: |
            caches
            notifications
            jdks
            wrapper
            toolchains

      - name: 'Execute Gradle build'
        run: ./gradlew --no-daemon --build-cache build
        id: build

      - name: 'Upload build reports'
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-reports-${{ matrix.os }}
          path: |
            build/reports
            */build/reports
          retention-days: 7

  publish:
    needs: [check, build, test-docs]
    if: ${{ github.event_name != 'pull_request' && github.ref_type == 'tag' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 'Set up JDK 17'
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: 'Setup Gradle'
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: ${{ needs.check.outputs.gradle_version }}
          gradle-home-cache-includes: |
            caches
            notifications
            jdks
            wrapper
            toolchains

      - name: 'publish build'
        run: ./gradlew --no-daemon -Prelease jreleaserDeploy jreleaserUpload
        env:
          SIGNING_PUBLIC_KEY: ${{ secrets.JRELEASER_GPG_PUBLIC_KEY }}
          SIGNING_SECRET_KEY: ${{ secrets.JRELEASER_GPG_SECRET_KEY }}
          SIGNING_PASSWORD: ${{ secrets.JRELEASER_GPG_PASSPHRASE }}
          JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.JRELEASER_GPG_PUBLIC_KEY }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.JRELEASER_GPG_SECRET_KEY }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.JRELEASER_GPG_PASSPHRASE }}
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}

      - name: 'publish plugin'
        run: ./gradlew --no-daemon -Prelease cabe-gradle-plugin:publishPlugins
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}

  build-docs:
    needs: [check, build]
    runs-on: ubuntu-latest
    outputs:
      algolia_artifact: ${{ steps.define-ids.outputs.algolia_artifact }}
      artifact: ${{ steps.define-ids.outputs.artifact }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Define instance id and artifacts
        id: define-ids
        run: |
          INSTANCE=${INSTANCE#*/}
          INSTANCE_ID_UPPER=$(echo "$INSTANCE" | tr '[:lower:]' '[:upper:]')
          ARTIFACT="webHelp${INSTANCE_ID_UPPER}2-all.zip"
          ALGOLIA_ARTIFACT="algolia-indexes-${INSTANCE_ID_UPPER}.zip"

          # Print the values
          echo "INSTANCE_ID_UPPER: $INSTANCE_ID_UPPER"
          echo "ARTIFACT: $ARTIFACT"
          echo "ALGOLIA_ARTIFACT: $ALGOLIA_ARTIFACT"

          # Set the environment variables and outputs
          echo "INSTANCE_ID_UPPER=$INSTANCE_ID_UPPER" >> $GITHUB_ENV
          echo "ARTIFACT=$ARTIFACT" >> $GITHUB_ENV
          echo "ALGOLIA_ARTIFACT=$ALGOLIA_ARTIFACT" >> $GITHUB_ENV
          echo "artifact=$ARTIFACT" >> $GITHUB_OUTPUT
          echo "algolia_artifact=$ALGOLIA_ARTIFACT" >> $GITHUB_OUTPUT

      - name: Build docs using Writerside Docker builder
        uses: JetBrains/writerside-github-action@v4
        with:
          instance: ${{ env.INSTANCE }}
          artifact: ${{ env.ARTIFACT }}
          docker-version: ${{ env.DOCKER_VERSION }}

      - name: Save artifact with build results
        uses: actions/upload-artifact@v7
        with:
          name: docs
          path: |
            artifacts/${{ env.ARTIFACT }}
            artifacts/report.json
            artifacts/${{ env.ALGOLIA_ARTIFACT }}
          retention-days: 7

  test-docs:
    needs: build-docs
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: docs
          path: artifacts

      - name: Test documentation
        uses: JetBrains/writerside-checker-action@v1
        with:
          instance: ${{ env.INSTANCE }}
          
  log-docs-deployment-status:
    needs: [check, build, test-docs]
    runs-on: ubuntu-latest
    if: ${{ github.ref_type != 'tag' }}
    steps:
      - name: Log version information
        run: |
          echo "Project version: ${{ needs.check.outputs.version }}"
          echo "Skipping documentation deployment because this is not a release tag."
          echo "Documentation will only be deployed when a tag is present."

  deploy-docs:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: [check, build, build-docs, test-docs]
    if: ${{ github.ref_type == 'tag' }}
    runs-on: ubuntu-latest
    steps:
      - name: Log version information
        run: |
          echo "Project version: ${{ needs.check.outputs.version }}"
          echo "Deploying documentation to GitHub Pages because a tag is present."
      
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: docs
          path: artifacts

      - name: Unzip artifact
        run: unzip -O UTF-8 -qq "artifacts/${{ needs.build-docs.outputs.artifact }}" -d dir

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Package and upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dir

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  bump-version:
    needs: publish
    if: ${{ github.event_name == 'push' && github.ref_type == 'tag' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout tag
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Calculate new version
        id: calc-version
        shell: bash
        run: |
          VERSION=$(grep -E "val projectVersion = " build.gradle.kts | sed -E 's/.*"(.*)".*/\1/')
          echo "Current version: $VERSION"
          
          if [[ "$VERSION" == *"-SNAPSHOT" ]]; then
            echo "Already a SNAPSHOT version. No update needed."
            echo "bump=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          NEW_VERSION=""
          if [[ "$VERSION" =~ (.*(rc|beta))([0-9]*)$ ]]; then
            BASE="${BASH_REMATCH[1]}"
            NUM="${BASH_REMATCH[3]}"
            if [[ -z "$NUM" ]]; then
              NUM=2
            else
              NUM=$((NUM + 1))
            fi
            NEW_VERSION="${BASE}${NUM}-SNAPSHOT"
          elif [[ "$VERSION" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[2]}"
            PATCH="${BASH_REMATCH[3]}"
            NEW_PATCH=$((PATCH + 1))
            NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}-SNAPSHOT"
          else
            echo "Version format not recognized for automatic bumping. Fallback to appending -SNAPSHOT."
            NEW_VERSION="${VERSION}-SNAPSHOT"
          fi
          
          echo "New version: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "bump=true" >> $GITHUB_OUTPUT

      - name: Checkout main branch
        if: steps.calc-version.outputs.bump == 'true'
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Update version and push
        if: steps.calc-version.outputs.bump == 'true'
        shell: bash
        run: |
          NEW_VERSION="${{ steps.calc-version.outputs.new_version }}"
          
          # Update version in build.gradle.kts
          sed -i "s/val projectVersion = \"[^\"]*\"/val projectVersion = \"$NEW_VERSION\"/" build.gradle.kts
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add build.gradle.kts
          git commit -m "updating project version to $NEW_VERSION"
          git push origin main
